services:
  django:
    build: .
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB={{cookiecutter.project_slug}}
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432" # Usamos 5433 para no chocar con tu 'db up' global
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d {{cookiecutter.project_slug}}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
