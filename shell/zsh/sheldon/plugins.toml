# sheldon configuration file
# Symlinked from dotfiles to ~/.config/sheldon/plugins.toml

shell = "zsh"

[plugins]

# --- Core Oh My Zsh Library ---
# Load essential library files, excluding tests
[plugins.oh-my-zsh-lib]
github = "ohmyzsh/ohmyzsh"
dir = "lib"
use = ["{functions,directories,completion,history,key-bindings,theme-and-appearance,termsupport,clipboard,cli,misc}.zsh"]

# --- Independent Plugins ---

# Z - Directory Jumper
[plugins.z]
github = "rupa/z"
branch = "master"

# FZF and related tools
[plugins.fzf]
github = "junegunn/fzf"
use = ["shell/completion.zsh", "shell/key-bindings.zsh"]

[plugins.fzf-tab]
github = "Aloxaf/fzf-tab"

[plugins.zsh-ctrlp]
github = "desyncr/zsh-ctrlp"

[plugins.zsh-fzf-history-search]
github = "joshskidmore/zsh-fzf-history-search"

# Zsh-users plugins (essential)
[plugins.zsh-autosuggestions]
github = "zsh-users/zsh-autosuggestions"

[plugins.zsh-completions]
github = "zsh-users/zsh-completions"

# Syntax highlighting
[plugins.fast-syntax-highlighting]
github = "zdharma-continuum/fast-syntax-highlighting"

# Other utilities
[plugins.alias-tips]
github = "djui/alias-tips"

[plugins.zsh-git-semantic-commits]
github = "alexrochas/zsh-git-semantic-commits"

# --- Oh My Zsh plugins ---

[plugins.git]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/git"

[plugins.dotnet]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/dotnet"

[plugins.command-not-found]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/command-not-found"

[plugins.vscode]
github = "ohmyzsh/ohmyzsh"
dir = "plugins/vscode"
