version: '3.8'

services:
  postgres:
    image: postgres:latest
    restart: always
    environment:
      # Dynamic variables from your project's .env
      POSTGRES_DB: ${DB_NAME:-dev_db}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASS:-password}
    ports:
      # Support for dynamic port, defaults to 5432
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  # Prefixed by project name automatically by our 'db' function
  postgres_data:
