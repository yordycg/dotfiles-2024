# #######################################################################################
# RESTORED HYPR CONFIG
# #######################################################################################

source = ~/.config/hypr/colors.conf

################
### MONITORS ###
################

# Ajustado para tu monitor eDP-1 sin escalado (zoom)
monitor=eDP-1,1920x1080@60,0x0,1

###################
### MY PROGRAMS ###
###################

$terminal = ghostty
$fileManager = thunar
$menu = tofi-drun -c ~/.config/tofi/configA --drun-launch=true
$browser = thorium-browser --enable-features=UseOzonePlatform --ozone-platform=wayland
$notes = obsidian
$editor = code
$editor-alt = ghostty -e nvim
$colorPicker = hyprpicker

#################
### AUTOSTART ###
#################

exec-once=/usr/lib/polkit-kde-authentication-agent-1
exec-once=gnome-keyring-daemon --start --components=secrets
exec-once=swaync
exec-once=waybar
exec-once = bash $HOME/workspace/repos/dotfiles-2024/scripts/wallpaper-init.sh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = hypridle
exec-once = blueman-applet

exec-once=dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
env = ELECTRON_OZONE_PLATFORM_HINT,auto

env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_STYLE_OVERRIDE,kvantum

env = GDK_BACKEND,wayland,x11,*
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland

env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

#####################
### LOOK AND FEEL ###
#####################

general { 
    gaps_in = 5
    gaps_out = 5
    border_size = 2

    col.active_border = $accent $bg 45deg
    col.inactive_border = $border

    resize_on_border = true 
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        vibrancy = 0.1696
        ignore_opacity = true
    }
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1
    animation = windows, 1, 6, wind, slide
    animation = windowsIn, 1, 6, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 1, liner
    animation = borderangle, 1, 30, liner, loop
    animation = fade, 1, 10, default
    animation = workspaces, 1, 5, wind
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc { 
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    vrr = 0
}

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        scroll_factor = 0.5
    }
}

gestures {
    gesture = 3, horizontal, workspace
}

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

# --- KEYBINDINGS ---
$mainMod = SUPER

bind = $mainMod, T, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, O, exec, $notes
bind = $mainMod, C, exec, $editor
bind = $mainMod, S, exec, $editor-alt
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, F, exec, $fileManager
bind = $mainMod, W, togglefloating,
bind = $mainMod, A, exec, $menu
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod, J, togglesplit,

bind = $mainMod, N, exec, swaync-client -t -sw
bind = $mainMod, E, exec, smile

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod SHIFT, S, movetoworkspace, special:magic
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, Z, movewindow
bindm = $mainMod, X, resizewindow

binde = $mainMod+Ctrl, Right, resizeactive, 30 0
binde = $mainMod+Ctrl, Left, resizeactive, -30 0
binde = $mainMod+Ctrl, Up, resizeactive, 0 -30
binde = $mainMod+Ctrl, Down, resizeactive, 0 30

bind = SUPER, V, exec, cliphist list | tofi -c ~/.config/tofi/configV | cliphist decode | wl-copy
bind = $mainMod, P, exec, $colorPicker | wl-copy 
bind = SUPER, L, exec, hyprlock
bind = SUPER, ESCAPE, exec, wlogout
bind = Ctrl, Escape, exec, killall waybar || waybar

bind = , Print, exec, grimblast --notify copysave screen
bind = SUPER, Print, exec, grimblast --notify copysave active
bind = SUPER ALT, Print, exec, grimblast --notify copysave area

bind = , XF86AudioRaiseVolume, exec, pamixer -i 5 
bind = , XF86AudioLowerVolume, exec, pamixer -d 5 
bind = , XF86AudioMicMute, exec, pamixer --default-source -m
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioPause, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
bind = , XF86MonBrightnessUp, exec, brightnessctl s +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

windowrule = opacity 0.90 0.90, match:class jone
windowrule = opacity 0.90 0.90, match:class Thorium-browser
windowrule = opacity 0.80 0.80, match:class Code
windowrule = opacity 0.80 0.80, match:class Arduino IDE
windowrule = opacity 0.80 0.80, match:class dev.warp.Warp
windowrule = opacity 0.80 0.80, match:class obsidian
windowrule = opacity 0.80 0.80, match:class code-url-handler
windowrule = opacity 0.80 0.80, match:class code-insiders-url-handler
windowrule = opacity 0.80 0.80, match:class kitty
# windowrule = opacity 0.80 0.80, match:class ghostty
windowrule = opacity 0.80 0.80, match:class org.gnome.Nautilus
windowrule = opacity 0.80 0.80, match:class org.kde.ark
windowrule = opacity 0.80 0.80, match:class nwg-look
windowrule = opacity 0.80 0.80, match:class qt5ct
windowrule = opacity 0.80 0.80, match:class qt6ct
windowrule = opacity 0.80 0.80, match:class kvantummanager
windowrule = opacity 0.80 0.70, match:class pavucontrol
windowrule = opacity 0.80 0.70, match:class blueman-manager
windowrule = opacity 0.80 0.70, match:class nm-applet
windowrule = opacity 0.70 0.70, match:class Spotify
windowrule = opacity 0.70 0.70, match:class Spotify Free
windowrule = opacity 0.80 0.70, match:class nm-connection-editor
windowrule = opacity 0.80 0.70, match:class org.kde.polkit-kde-authentication-agent-1
windowrule = opacity 0.80 0.70, match:class polkit-gnome-authentication-agent-1
windowrule = opacity 0.80 0.70, match:class org.freedesktop.impl.portal.desktop.gtk
windowrule = opacity 0.80 0.70, match:class org.freedesktop.impl.portal.desktop.hyprland

layerrule = ignore_alpha 0, match:class tofi
layerrule = ignore_alpha 1, match:class dunst
layerrule = blur on, match:class dunst
