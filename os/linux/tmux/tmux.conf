# source-file "$DOTFILES/os/linux/tmux/tmux.reset.conf"
source-file "$DOTFILES/os/linux/tmux/tmux.reset.conf"

# Use zsh as default shell
set -g default-shell /bin/zsh
# set -g default-shell /home/linuxbrew/.linuxbrew/bin/fish

# Enable 256-color and true-color (24-bit) support in tmux
set -g default-terminal 'screen-256color'
set -ga terminal-overrides ',*256col*:Tc'
# set-option -a terminal-features 'xterm-256color:RGB'

# General
#----------------------------------------------------------------------------------------------------------------------
# True colors support
# set -g default-terminal 'screen-256color'   # enable 256-color and ture-color (24-bit) support in tmux
set -g default-terminal "${TERM}"
set -ga terminal-overrides ",*:RGB"

# set -g default-shell /bin/zsh               # use zsh as default shell
set -g set-clipboard on                     # use system clipboard
set -g mouse on                             # enable mouse support
set -g status-interval 3                    # update the status bar every 3 seconds (default: 15)
set -g detach-on-destroy off                # don't exit from tmux when closing a session
set -g escape-time 0                       # zero-out escape time delay => 0 - linux | 50ms - windows
set -g history-limit 1000000                # increase history size (from 2.000)
set -g renumber-windows on                  # renumbet all windows when any window is closed
set -g automatic-rename off                 # rename window automatic
setw -g mode-keys vi                        # enable vi mode to allow vim movements
set -g status-position top                  # move status bar in top position
set -g base-index 1                         # start indexing windows at 1 instead of 0
set -g pane-base-index 1                    # start indexing panes at 1 instead of 0
set -g renumber-windows on                  # automatically renumber windows when one is closed

# TEST: pasar multiples comandos a tmux sin usar el prefix
set -g repeat-time 1000

#----------------------------------------------------------------------------------------------------------------------
# Image Preview
# - Enable image preview in tmux session
#----------------------------------------------------------------------------------------------------------------------
set -gg allow-passthrough all
set -g visual-activity off
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

#----------------------------------------------------------------------------------------------------------------------
# Set prefix key
#----------------------------------------------------------------------------------------------------------------------
unbind C-b                                  # Quitar prefijo por defecto
set -g prefix C-Space                       # Usar Ctrl+Space (Ergonómico y pro)
bind C-Space send-prefix                    # Permitir enviar el prefijo si es necesario

#----------------------------------------------------------------------------------------------------------------------
# Load theme
#----------------------------------------------------------------------------------------------------------------------
# NOTE: To apply theme changes: tmux kill-server && rm -rf /tmp/tmux-*
if-shell 'test "$TMUX_THEME" = "onedark"' 'source-file "$DOTFILES/os/linux/tmux/themes/onedark.conf"'
if-shell 'test "$TMUX_THEME" = "nord"' 'source-file "$DOTFILES/os/linux/tmux/themes/nord.conf"'
if-shell 'test "$TMUX_THEME" = "minimalist"' 'source-file "$DOTFILES/os/linux/tmux/themes/minimalist.conf"'
if-shell 'test "$TMUX_THEME" = "adib-hanna"' 'source-file "$DOTFILES/os/linux/tmux/themes/adib-hanna.conf"'

# ... (omitiendo la sección comentada de status bar por ahora para brevedad en la edición)

#----------------------------------------------------------------------------------------------------------------------
# List of plugins
#----------------------------------------------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'                           # load tpm
set -g @tpm_plugins_path "$DOTFILES/os/linux/tmux/plugins/" # define plugins path

# ... (resto de plugins igual)
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'joshmedeski/t-smart-tmux-session-manager'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'wfxr/tmux-fzf-url'

# ... (configuraciones de plugins igual)
set -g @tmux-fzf-launch-key 'F'
set -g @fzf-url-fzf-options '-p 70%,50% --prompt="" --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'
set -g @sessionx-bind 'o'
set -g @sessionx-zoxide-mode 'on'

# Automatic tpm installation
if-shell "test ! -d $DOTFILES/os/linux/tmux/plugins/tpm" \
    "run-shell 'git clone https://github.com/tmux-plugins/tpm $DOTFILES/os/linux/tmux/plugins/tpm && $DOTFILES/os/linux/tmux/plugins/tpm/bin/install_plugins'"

run-shell "$DOTFILES/os/linux/tmux/plugins/tpm/tpm"  # run tpm (always end of line) | run with prefix + I
