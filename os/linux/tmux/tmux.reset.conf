# -r: Significa que puedes repetir el comando sin presionar el prefijo de nuevo
# -n: Significa que NO necesitas presionar el prefijo (atajo directo)

#----------------------------------------------------------------------------------------------------------------------
# Configuración Básica
#----------------------------------------------------------------------------------------------------------------------
bind r command-prompt "rename-window %%" # [Tmux] Renombrar la ventana actual
bind R source-file "$DOTFILES/os/linux/tmux/tmux.conf" \; display-message "Config reloaded..." # [Tmux] Recargar configuración
bind c new-window -c "#{pane_current_path}" # [Tmux] Crear nueva ventana (pestaña)
bind Space last-window # [Tmux] Alternar entre las dos últimas ventanas
bind b switch-client -l # [Tmux] Alternar entre las dos últimas sesiones
bind-key X command-prompt -p "kill window: " "kill-window -t '%%'" # [Tmux] Matar ventana específica (pide ID)

#----------------------------------------------------------------------------------------------------------------------
# Paneles y Navegación (Vim Style)
#----------------------------------------------------------------------------------------------------------------------
# Divisiones
bind s split-window -v -c "#{pane_current_path}" # [Tmux] Dividir panel horizontalmente (Split)
bind v split-window -h -c "#{pane_current_path}" # [Tmux] Dividir panel verticalmente (Vertical)

# Movimiento entre paneles
bind -r h select-pane -L # [Tmux] Ir al panel izquierdo
bind -r j select-pane -D # [Tmux] Ir al panel de abajo
bind -r k select-pane -U # [Tmux] Ir al panel de arriba
bind -r l select-pane -R # [Tmux] Ir al panel derecho

# Redimensionar paneles (Alt + Flechas sin prefijo / Prefix + Flechas)
bind -n M-Left resize-pane -L 5
bind -n M-Down resize-pane -D 5
bind -n M-Up resize-pane -U 5
bind -n M-Right resize-pane -R 5

bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
bind -r z resize-pane -Z     # [Tmux] Maximizar el panel actual (Zoom)

#----------------------------------------------------------------------------------------------------------------------
# Navegación entre Ventanas (Pestañas)
#----------------------------------------------------------------------------------------------------------------------
bind -r H previous-window # [Tmux] Ventana anterior (Mayúscula + H)
bind -r L next-window     # [Tmux] Ventana siguiente (Mayúscula + L)

#----------------------------------------------------------------------------------------------------------------------
# Herramientas Popups (Alt / Meta Keys - No necesitan prefijo)
#----------------------------------------------------------------------------------------------------------------------
bind -n M-g display-popup -d "#{pane_current_path}" -xC -yC -w90% -h90% -B -E -e "TMUX_POPUP=1" 'lazygit' # [Tmux] Abrir LazyGit (Alt+g)
bind -n M-y display-popup -d "#{pane_current_path}" -xC -yC -w90% -h90% -B -E -e "TMUX_POPUP=1" 'yazi'    # [Tmux] Abrir Yazi (Alt+y)
bind -n M-t display-popup -d "#{pane_current_path}" -xC -yC -w90% -h90% -B -E -e "TMUX_POPUP=1" # [Tmux] Abrir Terminal Popup (Alt+t)
bind -n M-s display-popup -d "#{pane_current_path}" -xC -yC -w90% -h90% -E # [Tmux] Abrir Terminal de notas/scratch (Alt+s)
bind -n M-n new-window -c "#{pane_current_path}" # [Tmux] Abrir nueva ventana rápido (Alt+n)

#----------------------------------------------------------------------------------------------------------------------
# Otros (Búsqueda y Modo Copia)
#----------------------------------------------------------------------------------------------------------------------
# Búsqueda con fzf (Llama a funciones de shell/functions/search.sh)
bind C-e display-popup -E "bash -c 'source $DOTFILES/shell/functions/search.sh && tmux-sessions'" # [Tmux] Buscar y saltar entre sesiones
bind C-f display-popup -E "bash -c 'source $DOTFILES/shell/functions/search.sh && tmux-windows'"  # [Tmux] Buscar y saltar entre ventanas (todas las sesiones)

# Modo Copia (Vim keys)
bind-key -T copy-mode-vi 'v' send -X begin-selection # [Tmux] Iniciar selección con 'v' (modo vi)
bind-key -T copy-mode-vi 'y' send -X copy-selection  # [Tmux] Copiar texto con 'y' (modo vi)
