# -----------------------------------------------------------------------------
# psmux Configuration (Windows Tmux Native)
# -----------------------------------------------------------------------------

# --- General Settings ---
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g mouse on
set -g set-clipboard on
set -g status-position top
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 50
set -g history-limit 50000

# --- Key Bindings (Mirror Linux Setup) ---

# Core
bind r command-prompt "rename-window %%"
bind R source-file "~/.tmux.conf" \; display-message "Config reloaded..."
bind c new-window
bind Space last-window

# Persistence (psmux-restore)
bind C-s run-shell "psmux-restore save"
bind C-r run-shell "psmux-restore restore"

# Splits (s for horizontal, v for vertical)
bind s split-window -v
bind v split-window -h

# Pane Navigation (Vim Style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window Navigation
bind H previous-window
bind L next-window

# Popups (Alt / Meta Keys - No prefix for fast access)
bind -n M-g display-popup -w 90% -h 90% -E "lazygit"
bind -n M-d display-popup -w 90% -h 90% -E "lazydocker"
bind -n M-t display-popup -w 90% -h 90% -E "pwsh --NoLogo"

# Resize Panes
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
bind z resize-pane -Z

# Copy Mode (Vim keys)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# --- Plugins (Manual Loading) ---
set -g @continuum-restore 'on'

source-file "~/.psmux/plugins/psmux-sensible/plugin.conf"
source-file "~/.psmux/plugins/psmux-resurrect/plugin.conf"
source-file "~/.psmux/plugins/psmux-continuum/plugin.conf"
