# -----------------------------------------------------------------------------
# psmux Configuration (Windows Tmux Native)
# -----------------------------------------------------------------------------

# --- General Settings ---
set -g prefix C-Space
unbind C-b
bind C-Space send-prefix

set -g mouse on
set -g set-clipboard on
set -g status-position top
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 50
set -g history-limit 50000

# --- Key Bindings (Mirror Linux Setup) ---

# Core
bind r command-prompt "rename-window %%"
bind R source-file "~/.psmux.conf" \; display-message "Config reloaded..."
bind c new-window
bind Space last-window

# Splits (s for horizontal, v for vertical)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

# Pane Navigation (Vim Style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Window Navigation
bind H previous-window
bind L next-window

# Session Picker (Fuzzy)
# Prefix + f to switch between sessions quickly
unbind f
bind f display-popup -w 40% -h 70% -E "pwsh -NoProfile -Command '$s = psmux ls -F ''#{session_name}'' | fzf --reverse --header=''Switch Session''; if ($s) { psmux switch-client -t $s }'"

# Resize Panes
bind -r Left resize-pane -L 5
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5
bind z resize-pane -Z

# Copy Mode (Vim keys)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# --- Plugins (PPM) ---
set -g @plugin 'psmux-plugins/ppm'
set -g @plugin 'psmux-plugins/psmux-sensible'
set -g @plugin 'psmux-plugins/psmux-resurrect'
set -g @plugin 'psmux-plugins/psmux-continuum'

set -g @continuum-restore 'on'

# Initialize PPM (This will source all @plugins)
run 'pwsh -NoProfile -ExecutionPolicy Bypass -File "~/.psmux/plugins/ppm/ppm.ps1"'

# --- Overrides (Fix Blocking) ---
# We use -b to prevent the output from psmux-resurrect from blocking the UI.
# The script already uses `display-message` for non-blocking notifications.
bind C-s run-shell -b 'pwsh -NoProfile -ExecutionPolicy Bypass -File "~/.psmux/plugins/psmux-resurrect/scripts/save.ps1"'
bind C-r run-shell -b 'pwsh -NoProfile -ExecutionPolicy Bypass -File "~/.psmux/plugins/psmux-resurrect/scripts/restore.ps1"'
